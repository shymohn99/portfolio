<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shymohn | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Noto+Sans+JP:wght@300&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --main-black: #1a1a1a;
            --accent-red: #8c2132;
            --accent-navy: #1a2d4f;
            --line-gray: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--main-black);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- Hero Section: Icon Drawing --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .icon-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* アイコンを囲む動的な円 */
        .icon-svg-outline {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: rotate(-90deg);
        }

        .icon-svg-outline circle {
            fill: none;
            stroke: var(--main-black);
            stroke-width: 1;
            stroke-dasharray: 628; /* 2 * PI * r */
            stroke-dashoffset: 628;
        }

        .main-icon {
            width: 160px;
            height: 160px;
            border-radius: 4px;
            opacity: 0;
            transform: scale(0.9);
            filter: grayscale(20%);
        }

        .name-area {
            margin-top: 40px;
            text-align: center;
            opacity: 0;
        }

        .name-area h1 {
            font-size: 28px;
            font-weight: 200;
            letter-spacing: 0.6em;
            margin: 0;
            text-transform: uppercase;
        }

        /* --- Achievements Section --- */
        .section-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px;
        }

        .section-title {
            font-size: 12px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--accent-navy);
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .section-title::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: var(--line-gray);
        }

        /* 箇条書きリストのスタイル */
        .achievement-list {
            list-style: none;
            padding: 0;
        }

        .achievement-item {
            display: flex;
            align-items: flex-start;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
            opacity: 0;
            transform: translateY(20px);
        }

        .achievement-item:last-child { border-bottom: none; }

        /* 文頭の記号を幾何学的に */
        .item-marker {
            width: 8px;
            height: 8px;
            border: 1px solid var(--main-black);
            margin-right: 20px;
            margin-top: 6px;
            flex-shrink: 0;
            transform: rotate(45deg);
        }

        .item-text {
            font-size: 15px;
            line-height: 1.6;
            color: #333;
            letter-spacing: 0.05em;
        }

        .highlight {
            font-weight: 400;
            color: var(--accent-red);
            margin-left: 8px;
        }

        .scroll-down {
            position: absolute;
            bottom: 40px;
            font-size: 10px;
            letter-spacing: 0.4em;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="icon-wrapper">
            <!-- アイコン描画用のSVG -->
            <svg class="icon-svg-outline" viewBox="0 0 210 210">
                <circle cx="105" cy="105" r="100" />
            </svg>
            <img src="icon.png" alt="Shymohn" class="main-icon" id="iconImg">
        </div>

        <div class="name-area" id="nameArea">
            <h1>Shymohn</h1>
            <p style="font-size: 11px; letter-spacing: 0.2em; margin-top: 15px; color: #888;">High School Student / Competitor</p>
        </div>

        <div class="scroll-down">SCROLL</div>
    </section>

    <section class="section-container" id="achievements">
        <div class="section-title">Achievements</div>
        
        <ul class="achievement-list">
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">INSO <span class="highlight">日本代表</span></div>
            </li>
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">JOL '26 <span class="highlight">金賞 (1st)</span></div>
            </li>
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">AtCoder <span class="highlight">最高青 / 現在水</span></div>
            </li>
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">AJL H <span class="highlight">銀メダル</span></div>
            </li>
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">OMC <span class="highlight">水</span></div>
            </li>
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">APLO '26 / PCK 新人賞 / 県科学オリ 🥈</div>
            </li>
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">情報オリンピック (JOI) <span class="highlight">7th</span></div>
            </li>
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">東大特進 / 理科一・三類志望</div>
            </li>
        </ul>
    </section>

    <script>
        window.onload = () => {
            gsap.registerPlugin(ScrollTrigger);
            const tl = gsap.timeline();

            // 1. アイコンの円を描画
            tl.to(".icon-svg-outline circle", {
                strokeDashoffset: 0,
                duration: 1.5,
                ease: "power2.inOut"
            })
            // 2. アイコン画像をフェードイン
            .to("#iconImg", {
                opacity: 1,
                scale: 1,
                duration: 1.2,
                ease: "power2.out"
            }, "-=0.5")
            // 3. 名前を表示
            .to("#nameArea", {
                opacity: 1,
                y: -10,
                duration: 1,
                ease: "power2.out"
            }, "-=0.5");

            // 4. 箇条書き実績をスクロールに合わせて動的に表示
            gsap.to(".achievement-item", {
                scrollTrigger: {
                    trigger: "#achievements",
                    start: "top 70%",
                },
                opacity: 1,
                y: 0,
                stagger: 0.15,
                duration: 1,
                ease: "power3.out"
            });
        };
    </script>
</body>
</html>
