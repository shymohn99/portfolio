<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shymohn | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Noto+Sans+JP:wght@300&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --main-black: #1a1a1a;
            --accent-red: #8c2132;
            --accent-navy: #1a2d4f;
            --line-gray: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--main-black);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        a { text-decoration: none; color: inherit; transition: 0.3s; }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .icon-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-svg-outline {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: rotate(-90deg);
        }

        .icon-svg-outline circle {
            fill: none;
            stroke: var(--main-black);
            stroke-width: 1;
            stroke-dasharray: 628;
            stroke-dashoffset: 628;
        }

        .main-icon {
            width: 160px;
            height: 160px;
            border-radius: 4px;
            opacity: 0;
            transform: scale(0.9);
        }

        .name-area {
            margin-top: 40px;
            text-align: center;
            opacity: 0;
        }

        .name-area h1 {
            font-size: 28px;
            font-weight: 200;
            letter-spacing: 0.6em;
            margin: 0;
            text-transform: uppercase;
        }

        /* ソーシャルリンク（Hero内） */
        .social-links {
            margin-top: 25px;
            display: flex;
            gap: 30px;
            font-size: 11px;
            letter-spacing: 0.2em;
            opacity: 0;
            transform: translateY(10px);
        }

        .social-link {
            position: relative;
            padding-bottom: 5px;
            font-weight: 300;
            color: #666;
        }

        .social-link::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0;
            width: 0%;
            height: 1px;
            background: var(--main-black);
            transition: width 0.4s ease;
        }

        .social-link:hover::after { width: 100%; }
        .social-link:hover { color: var(--main-black); }

        /* --- Achievements Section --- */
        .section-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px;
        }

        .section-title {
            font-size: 12px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--accent-navy);
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .section-title::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: var(--line-gray);
        }

        .achievement-list { list-style: none; padding: 0; }
        .achievement-item {
            display: flex;
            align-items: flex-start;
            padding: 18px 0;
            border-bottom: 1px solid #f0f0f0;
            opacity: 0;
            transform: translateY(20px);
        }

        .item-marker {
            width: 8px; height: 8px;
            border: 1px solid var(--main-black);
            margin-right: 20px; margin-top: 6px;
            flex-shrink: 0; transform: rotate(45deg);
        }

        .item-text { font-size: 15px; line-height: 1.6; color: #333; }
        .highlight { font-weight: 400; color: var(--accent-red); margin-left: 8px; }

        /* --- Footer --- */
        footer {
            padding: 100px 20px;
            text-align: center;
            border-top: 1px solid #f0f0f0;
            background-color: #fafafa;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        .copyright {
            font-size: 10px;
            letter-spacing: 0.2em;
            color: #aaa;
        }

        .scroll-down {
            position: absolute;
            bottom: 40px;
            font-size: 10px;
            letter-spacing: 0.4em;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="icon-wrapper">
            <svg class="icon-svg-outline" viewBox="0 0 210 210">
                <circle cx="105" cy="105" r="100" />
            </svg>
            <img src="icon.png" alt="Shymohn" class="main-icon" id="iconImg">
        </div>

        <div class="name-area" id="nameArea">
            <h1>Shymohn</h1>
            <div class="social-links" id="socialLinks">
                <!-- リンク先を自分のURLに変更してください -->
                <a href="https://atcoder.jp/users/Shymohn" target="_blank" class="social-link">ATCODER</a>
                <a href="https://onlinemathcontest.com/users/Shymohn" target="_blank" class="social-link">OMC</a>
                <a href="https://x.com/Shymohn" target="_blank" class="social-link">X (TWITTER)</a>
            </div>
        </div>

        <div class="scroll-down">SCROLL</div>
    </section>

    <section class="section-container" id="achievements">
        <div class="section-title">Achievements</div>
        
        <ul class="achievement-list">
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">INSO <span class="highlight">日本代表</span></div>
            </li>
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">JOL '26 <span class="highlight">金賞</span></div>
            </li>
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">AtCoder <span class="highlight">Heuristic青 / Algorithm水</span></div>
            </li>
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">AJL H <span class="highlight">銀メダル</span></div>
            </li>
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">OMC <span class="highlight">水</span></div>
            </li>
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">情報科学の達人 <span class="highlight">7期生</span></div>
            </li>
            <li class="achievement-item">
                <div class="item-marker"></div>
                <div class="item-text">東大理科一・三類志望 / 東大特進</div>
            </li>
        </ul>
    </section>

    <footer>
        <div class="footer-links">
            <a href="https://atcoder.jp/users/Shymohn" target="_blank" class="social-link">AtCoder</a>
            <a href="https://onlinemathcontest.com/users/Shymohn" target="_blank" class="social-link">OMC</a>
            <a href="https://x.com/Shymohn" target="_blank" class="social-link">X</a>
        </div>
        <div class="copyright">&copy; 2024 Shymohn. All Rights Reserved.</div>
    </footer>

    <script>
        window.onload = () => {
            gsap.registerPlugin(ScrollTrigger);
            const tl = gsap.timeline();

            // 1. アイコンの円描画
            tl.to(".icon-svg-outline circle", {
                strokeDashoffset: 0,
                duration: 1.5,
                ease: "power2.inOut"
            })
            // 2. アイコン出現
            .to("#iconImg", {
                opacity: 1,
                scale: 1,
                duration: 1.2,
                ease: "power2.out"
            }, "-=0.5")
            // 3. 名前とソーシャルリンク出現
            .to("#nameArea", {
                opacity: 1,
                duration: 1,
                ease: "power2.out"
            }, "-=0.5")
            .to("#socialLinks", {
                opacity: 1,
                y: 0,
                duration: 0.8,
                stagger: 0.1
            }, "-=0.3");

            // 4. 実績リストのスクロール表示
            gsap.to(".achievement-item", {
                scrollTrigger: {
                    trigger: "#achievements",
                    start: "top 75%",
                },
                opacity: 1,
                y: 0,
                stagger: 0.15,
                duration: 0.8,
                ease: "power3.out"
            });
        };
    </script>
</body>
</html>
