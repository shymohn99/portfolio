<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Design Portfolio</title>
    <!-- Google Fonts: 洗練されたサンセリフ体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --line-color: #333333;
            --text-color: #333333;
            --font-main: 'Inter', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-main);
            color: var(--text-color);
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 背景のSVG */
        svg {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .line-main {
            fill: none;
            stroke: var(--line-color);
            stroke-width: 0.8;
        }

        .line-dashed {
            fill: none;
            stroke: var(--line-color);
            stroke-width: 0.5;
            stroke-dasharray: 4 4;
        }

        /* テキスト要素 */
        .label {
            position: absolute;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0;
        }

        /* 各配置 */
        .top { top: 5%; }
        .bottom { bottom: 5%; }
        .left { left: 5%; }
        .right { right: 5%; }
        
        .inner-left { transform: translateX(-220px); }
        .inner-right { transform: translateX(220px); }
        
        .center-top { transform: translateY(-70px); font-size: 9px; }
        .center-bottom { transform: translateY(70px); font-size: 9px; }

        #center-dot {
            width: 12px;
            height: 12px;
            background-color: black;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 0 1px black;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="container" id="scene">
    <!-- 幾何学ライン -->
    <svg viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
        <!-- 同心円（点線） -->
        <circle class="line-dashed" cx="500" cy="500" r="150" />
        <circle class="line-dashed" cx="500" cy="500" r="350" />
        
        <!-- 中央の「目」のようなカーブ -->
        <path id="curve-top" class="line-main" d="M 100 500 Q 500 400 900 500" />
        <path id="curve-bottom" class="line-main" d="M 100 500 Q 500 600 900 500" />

        <!-- 左右の大きな円弧 -->
        <circle class="line-main" cx="100" cy="500" r="400" />
        <circle class="line-main" cx="900" cy="500" r="400" />
    </svg>

    <!-- 中央の点 -->
    <div id="center-dot"></div>

    <!-- テキストラベル -->
    <div class="label top">Motion Design</div>
    <div class="label bottom">Web Development</div>
    <div class="label left">Visual Design</div>
    <div class="label right">Art Direction</div>
    
    <div class="label inner-left">Unique</div>
    <div class="label inner-right">Refind</div>
    
    <div class="label center-top">Continuously Pursuing</div>
    <div class="label center-bottom">Rebuilding Expression</div>
</div>

<script>
    window.onload = () => {
        const tl = gsap.timeline({ defaults: { ease: "power3.out", duration: 2 } });

        // 1. 線の描画アニメーション
        gsap.set(".line-main, .line-dashed", { drawSVG: "0%" }); // drawSVGプラグインなしの代替
        
        tl.from("svg circle, svg path", {
            strokeDasharray: "1000",
            strokeDashoffset: "1000",
            duration: 3,
            stagger: 0.2
        })
        
        // 2. 中央の点とテキストをふわっと出す
        .to(".label", {
            opacity: 1,
            stagger: 0.1,
            duration: 1
        }, "-=2")
        
        .from("#center-dot", {
            scale: 0,
            duration: 1
        }, "-=1.5");

        // 3. マウス追従のインタラクション
        document.addEventListener("mousemove", (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            gsap.to("#scene", {
                x: x * 0.5,
                y: y * 0.5,
                duration: 1,
                ease: "power2.out"
            });

            gsap.to("#center-dot", {
                x: x,
                y: y,
                duration: 0.5,
                ease: "power2.out"
            });
        });
    };
</script>

</body>
</html>
