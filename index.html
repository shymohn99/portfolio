<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shymohn | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fbfe;
            --grid-color: rgba(0, 150, 255, 0.1);
            --main-black: #1a1a1a;
            --card-bg: #ffffff;
            --card-border: #e1e8ed;
            --text-gray: #666;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--main-black);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
        }

        /* --- 幾何学的背景アニメーション --- */
        .bg-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px; /* 方眼のサイズ */
        }

        .floating-shape {
            position: absolute;
            stroke: rgba(0, 100, 255, 0.15);
            fill: none;
            stroke-width: 1;
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .icon-outer {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* アイコンを背景から浮かせるための白い円 */
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .icon-circle-svg {
            position: absolute;
            top: -10px; left: -10px;
            width: 240px; height: 240px;
            transform: rotate(-90deg);
        }

        .icon-circle-svg circle {
            fill: none;
            stroke: var(--main-black);
            stroke-width: 0.5;
            stroke-dasharray: 754;
            stroke-dashoffset: 754;
        }

        .main-icon {
            width: 160px;
            height: 160px;
            border-radius: 8px;
            z-index: 11;
            opacity: 0;
        }

        .name-area {
            margin-top: 40px;
            text-align: center;
            z-index: 12;
        }

        .name-area h1 {
            font-size: 32px;
            font-weight: 200;
            letter-spacing: 0.5em;
            margin: 0;
        }

        /* --- Social Link Section (Card Design) --- */
        .content-section {
            max-width: 1100px;
            margin: 0 auto;
            padding: 100px 20px;
        }

        .section-header {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 40px;
            border-left: 5px solid var(--main-black);
            padding-left: 15px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .social-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px 25px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .social-card:hover {
            transform: translateY(-5px);
            border-color: #007aff;
            box-shadow: 0 12px 20px rgba(0,122,255,0.1);
        }

        .card-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .card-platform-icon {
            font-size: 16px;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-gray);
            font-weight: 300;
        }

        /* --- Achievements List --- */
        .achievement-box {
            margin-top: 80px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
        }

        .achievement-list { list-style: none; padding: 0; }
        .achievement-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #ddd;
            font-size: 15px;
        }
        .item-dot {
            width: 6px; height: 6px;
            background: var(--main-black);
            margin-right: 15px;
            transform: rotate(45deg);
        }

        .highlight { color: #8c2132; font-weight: 500; margin-left: 10px; }
    </style>
</head>
<body>

    <!-- アニメーション背景 -->
    <div class="bg-fixed" id="bgGrid"></div>
    <svg class="bg-fixed" id="bgShapes"></svg>

    <section class="hero">
        <div class="icon-outer">
            <svg class="icon-circle-svg" viewBox="0 0 240 240">
                <circle cx="120" cy="120" r="118" />
            </svg>
            <img src="icon.png" alt="Shymohn" class="main-icon" id="mainIcon">
        </div>
        <div class="name-area" id="nameArea">
            <h1>Shymohn</h1>
            <p style="letter-spacing: 0.3em; font-size: 12px; color: #888; margin-top: 15px;">Competitor / Student</p>
        </div>
    </section>

    <section class="content-section">
        <div class="section-header">Social Link</div>
        
        <div class="card-grid">
            <!-- 各リンクカード -->
            <a href="https://atcoder.jp/users/Shymohn" target="_blank" class="social-card">
                <div class="card-top">
                    <span class="card-title">AtCoder</span>
                    <span class="card-platform-icon">🏆</span>
                </div>
                <div class="card-desc">AtCoder</div>
            </a>

            <a href="https://codeforces.com/profile/Shymohn" target="_blank" class="social-card">
                <div class="card-top">
                    <span class="card-title">CodeForces</span>
                    <span class="card-platform-icon">📊</span>
                </div>
                <div class="card-desc">CodeForces</div>
            </a>

            <a href="https://onlinemathcontest.com/users/Shymohn" target="_blank" class="social-card">
                <div class="card-top">
                    <span class="card-title">OnlineMathContest</span>
                    <span class="card-platform-icon">🔢</span>
                </div>
                <div class="card-desc">OMC</div>
            </a>

            <a href="https://x.com/Shymohn" target="_blank" class="social-card">
                <div class="card-top">
                    <span class="card-title">X (Twitter)</span>
                    <span class="card-platform-icon">𝕏</span>
                </div>
                <div class="card-desc">X</div>
            </a>

            <a href="https://github.com/Shymohn" target="_blank" class="social-card">
                <div class="card-top">
                    <span class="card-title">GitHub</span>
                    <span class="card-platform-icon">🐙</span>
                </div>
                <div class="card-desc">GitHub</div>
            </a>

            <a href="#" target="_blank" class="social-card">
                <div class="card-top">
                    <span class="card-title">Marshmallow</span>
                    <span class="card-platform-icon">🍬</span>
                </div>
                <div class="card-desc">マシュマロはこちらから</div>
            </a>
        </div>

        <!-- 実績セクション -->
        <div class="achievement-box">
            <div class="section-header" style="margin-top:0;">Achievements</div>
            <ul class="achievement-list">
                <li class="achievement-item"><div class="item-dot"></div>INSO <span class="highlight">日本代表</span></li>
                <li class="achievement-item"><div class="item-dot"></div>JOL '26 <span class="highlight">金賞 (1st)</span></li>
                <li class="achievement-item"><div class="item-dot"></div>AJL H <span class="highlight">銀</span></li>
                <li class="achievement-item"><div class="item-dot"></div>情報科学の達人<span class="highlight">7th</span></li>
                <li class="achievement-item"><div class="item-dot"></div>東大理科一・三類志望 / 東大特進</li>
            </ul>
        </div>
    </section>

    <script>
        window.onload = () => {
            gsap.registerPlugin(ScrollTrigger);

            // 1. 背景グリッドの無限移動
            gsap.to("#bgGrid", {
                backgroundPosition: "40px 40px",
                duration: 2,
                repeat: -1,
                ease: "none"
            });

            // 2. 幾何学オブジェクトの生成とアニメーション
            const svg = document.getElementById('bgShapes');
            for (let i = 0; i < 15; i++) {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                const r = Math.random() * 50 + 10;
                circle.setAttribute("cx", x);
                circle.setAttribute("cy", y);
                circle.setAttribute("r", r);
                circle.setAttribute("class", "floating-shape");
                svg.appendChild(circle);

                gsap.to(circle, {
                    x: (Math.random() - 0.5) * 200,
                    y: (Math.random() - 0.5) * 200,
                    duration: Math.random() * 10 + 10,
                    repeat: -1,
                    yoyo: true,
                    ease: "sine.inOut"
                });
            }

            // 3. ヒーローアニメーション
            const tl = gsap.timeline();
            tl.to(".icon-circle-svg circle", {
                strokeDashoffset: 0,
                duration: 1.5,
                ease: "power2.inOut"
            })
            .to("#mainIcon", {
                opacity: 1,
                duration: 1,
            }, "-=0.5")
            .from("#nameArea", {
                y: 30, opacity: 0, duration: 1
            }, "-=0.5");

            // 4. カードのスクロール表示
            gsap.from(".social-card", {
                scrollTrigger: {
                    trigger: ".card-grid",
                    start: "top 80%",
                },
                y: 40,
                opacity: 0,
                stagger: 0.1,
                duration: 0.8,
                ease: "power3.out"
            });
        };
    </script>
</body>
</html>
